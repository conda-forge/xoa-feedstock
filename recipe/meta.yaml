{% set name = "xoa" %}
{% set version = "2026.7.0" %}
{% set python_min = "3.10.*" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/xoa-{{ version }}.tar.gz
  sha256: 92063f1943495fb1c796cff2f91c3bda373af941399dd5666f2fb778d044d61f

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools >=64
  run:
    - platformdirs
    - cmocean
    - configobj
    - gsw
    - netcdf4
    - numba
    - pooch
    - python >={{ python_min }}
    - scipy
    - setuptools >=64
    - xarray

test:
  source_files:
    - tests/*
  imports:
    - xoa
  commands:
    - pip check
#    - xoa info
    - pytest tests
  requires:
    - pip
    - pytest
    - python {{ python_min }}

about:
  home: https://github.com/shom-fr/xoa
  summary: xarray-based ocean analysis library
  license: Apache-2.0
  license_file: LICENSE
  description: |
    xoa is intended to help reading and manipulating observed and
    simulated ocean data. It is heavily based on xarray.
  doc_url: https://xoa.readthedocs.io/
  dev_url: https://github.com/shom-fr/xoa

extra:
  recipe-maintainers:
    - stefraynaud
    - mmorvan
